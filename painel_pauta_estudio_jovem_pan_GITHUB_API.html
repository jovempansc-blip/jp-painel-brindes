<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pauta de Estúdio — Jovem Pan Floripa</title>
<style>
:root{
  --red:#d54b67;
  --red-past:#D46873;
  --green-now:#66C991;
  --orange-next:#E0A14A;
  --ink:#171c26;
  --muted:#667283;
  --line:#dce2eb;
  --panel:rgba(255,255,255,.92);
  --panel-strong:rgba(255,255,255,.97);
  --shadow:0 14px 34px rgba(17,23,34,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  font:800 14px/1.35 Inter,Arial,sans-serif;
  color:var(--ink);
  background-image:linear-gradient(rgba(248,249,252,.76),rgba(248,249,252,.76)),url("assets/bg-estudio.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
.wrap{max-width:1420px;margin:0 auto;padding:12px}
.hero{
  position:relative;
  min-height:76px;
  padding:14px 62px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.34);
  border:1px solid rgba(255,255,255,.56);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
  backdrop-filter:blur(4px);
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.30),rgba(255,255,255,.08));
  pointer-events:none;
}
.heroLogo{
  position:relative;
  z-index:1;
  width:min(540px,52%);
  height:auto;
  display:block;
  filter:drop-shadow(0 4px 10px rgba(255,255,255,.35)) drop-shadow(0 2px 8px rgba(0,0,0,.08));
}
.backIcon{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  z-index:2;
  width:34px;
  height:34px;
  border-radius:12px;
  border:1px solid rgba(115,124,138,.25);
  background:rgba(255,255,255,.72);
  color:#687281;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:16px;
  font-weight:900;
}
.panel{
  margin-top:12px;
  min-height:420px;
  background:var(--panel);
  border:1px solid rgba(220,226,235,.82);
  border-radius:26px;
  box-shadow:var(--shadow);
  overflow:hidden;
  backdrop-filter:blur(4px);
  display:flex;
  flex-direction:column;
}
.pautaHead{
  position:relative;
  min-height:72px;
  display:flex;
  align-items:center;
  padding:10px 22px;
  background:#E9EDF2;
  border-bottom:1px solid #D6DCE4;
}
.pautaTime{
  width:128px;
  flex:0 0 128px;
  font-family:"Bahnschrift","Segoe UI Semibold","Segoe UI Variable Display","Segoe UI",Inter,Arial,sans-serif;
  font-size:52px;
  font-weight:900;
  letter-spacing:-.025em;
  line-height:1;
  color:#5CCB91;
  text-shadow:none;
  -webkit-text-stroke:0;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-variant-numeric:lining-nums tabular-nums;
}
.time-past{color:var(--red-past)}
.time-now{color:var(--green-now)}
.time-next{color:var(--orange-next)}
.pautaProgram{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:calc(100% - 320px);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:30px;
  line-height:1.1;
  font-weight:950;
  letter-spacing:-.03em;
  color:#5B6675;
  -webkit-text-stroke:0;
  text-shadow:
    0 1px 1px rgba(49,58,72,.18),
    0 2px 6px rgba(49,58,72,.12),
    0 0 10px rgba(255,255,255,.18);
  padding:0 8px;
}
.headNav{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:14px;
}
.iconNav{
  appearance:none;
  border:0;
  background:transparent;
  padding:0;
  color:#7f8898;
  font:900 32px/1 Inter,Arial,sans-serif;
  cursor:pointer;
}
.iconNav:hover{color:var(--red-past)}
.pautaBody{
  min-height:348px;
  padding:28px 38px 30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:14px;
}
.titleBox{
  width:min(1040px,100%);
  background:#FFFFFF;
  border:1px solid #E3E8EF;
  border-left:5px solid #D94A64;
  border-radius:18px;
  padding:20px 24px;
  box-shadow:0 8px 20px rgba(17,23,34,.035);
}
.descBox{
  width:min(1040px,100%);
  background:#F3F6FA;
  border:1px solid #E1E7EE;
  border-radius:18px;
  padding:18px 24px;
}
.title{
  font-size:38px;
  line-height:1.06;
  letter-spacing:-.06em;
  margin:0;
  max-width:980px;
  margin-inline:auto;
}
.desc{
  font-size:20px;
  line-height:1.52;
  font-weight:650;
  color:#4D5868;
  max-width:1020px;
  margin:0 auto;
  white-space:pre-wrap;
  text-transform:none;
}
.winnerBox{
  width:min(840px,100%);
  margin-top:2px;
  padding:16px 18px;
  border-radius:16px;
  border:1px solid #d8e6db;
  background:#f4fbf7;
  text-align:center;
}
.winnerLabel{
  display:block;
  font-size:12px;
  letter-spacing:.08em;
  color:#4a6b57;
  font-weight:900;
  margin-bottom:6px;
}
.winnerName{
  display:block;
  font-size:26px;
  line-height:1.15;
  color:#17492d;
  letter-spacing:-.03em;
}
.pautaActions{
  width:min(1040px,100%);
  display:flex;
  justify-content:flex-end;
  margin-top:2px;
}
.winnerBtn{
  appearance:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:auto;
  min-width:0;
  height:auto;
  padding:0;
  border:0;
  background:transparent;
  color:#7a8494;
  font-weight:900;
  cursor:pointer;
}
.winnerBtn:hover{color:#8e1831}
.winnerBtn .trophy{font-size:22px;line-height:1;filter:grayscale(1);opacity:.78}
.promoFooter{
  margin-top:auto;
  min-height:44px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 12px;
  border-top:1px solid #f4d3a3;
  background:#fff1df;
}
.promoFooterList{
  width:100%;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  min-width:0;
  overflow:hidden;
}
.promoPill{
  appearance:none;
  border:1px solid #b7cee8;
  background:#eaf4ff;
  color:#2d5f93;
  min-height:17px;
  max-width:230px;
  border-radius:999px;
  padding:0 9px;
  font-size:9px;
  font-weight:900;
  letter-spacing:.04em;
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.promoPill.pending{border-color:#ffb45c;background:#fff3df;color:#a65300;animation:promoOrangeBlink 1.05s ease-in-out infinite}
@keyframes promoOrangeBlink{0%,100%{background:#fff3df;color:#a65300;box-shadow:0 0 0 rgba(255,138,0,0)}50%{background:#ff8a00;color:#fff;box-shadow:0 0 0 5px rgba(255,138,0,.18)}}
.promoPill.read{
  border-color:#badfc9;
  background:#effaf4;
  color:#1f7a49;
  cursor:pointer;
}
.promoPill.read .marquee{
  display:inline-grid;
  grid-template-columns:1fr;
  align-items:center;
  min-width:130px;
}
.promoPill.read .marquee span{
  grid-area:1/1;
  opacity:0;
  animation:promoMarquee 4s ease-in-out infinite;
  overflow:hidden;
  text-overflow:ellipsis;
}
.promoPill.read .marquee span:nth-child(2){animation-delay:2s}
@keyframes promoMarquee{0%,44%{opacity:1;transform:translateY(0)}50%,94%{opacity:0;transform:translateY(-3px)}100%{opacity:0;transform:translateY(3px)}}
.promoPill:hover{filter:brightness(.98)}
.promoListWrap{position:relative;display:flex;align-items:center;order:0}
.promoListBtn{
  appearance:none;
  border:0;
  background:transparent;
  padding:0 2px;
  color:#9aa4b3;
  font:900 20px/1 Inter,Arial,sans-serif;
  cursor:pointer;
}
.promoListBtn:hover{color:#6f7988}
.promoList{
  display:none;
  position:absolute;
  right:0;
  top:calc(100% + 10px);
  z-index:20;
  width:300px;
  max-height:300px;
  overflow:auto;
  padding:8px;
  border:1px solid #dfe5ec;
  border-radius:16px;
  background:#fff;
  box-shadow:0 16px 36px rgba(17,20,27,.14);
}
.promoList.show{display:grid;gap:6px}
.promoListItem{
  appearance:none;
  border:1px solid #e5e9ef;
  background:#f8f9fc;
  color:#252c38;
  border-radius:12px;
  padding:9px 10px;
  text-align:left;
  font-size:11px;
  line-height:1.25;
  font-weight:900;
  cursor:pointer;
}
.promoListItem small{display:block;margin-top:3px;color:#7a8494;font-size:9px}
.promoListItem.read{opacity:.62;border-color:#badfc9;background:#f2fbf6}
.hourReadList{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;width:100%}
.hourReadList .promoListItem{min-height:44px}
.promoReadCard{width:min(740px,100%)}
.promoReadBanner{
  aspect-ratio:4/1;
  border:1px solid #e2e7ef;
  border-radius:16px;
  background:#eef1f5;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#7a8493;
  font-size:11px;
  margin-bottom:14px;
}
.promoReadBanner img{width:100%;height:100%;object-fit:cover;display:block}
.promoReadMeta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px 0 14px;
}
.promoReadMeta span{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:0 10px;
  border-radius:999px;
  background:#f7f8fb;
  border:1px solid #e2e7ef;
  color:#566171;
  font-size:10px;
  font-weight:900;
}
.promoReadDesc{
  background:#f7f8fb;
  border:1px solid #e2e7ef;
  border-radius:14px;
  padding:13px 14px;
  color:#465161;
  line-height:1.5;
  font-size:13px;
  white-space:pre-wrap;
}
.modalBackdrop{
  position:fixed;
  inset:0;
  background:rgba(17,20,27,.28);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:50;
}
.modalBackdrop.show{display:flex}
.modalCard{
  width:min(460px,100%);
  background:#fff;
  border:1px solid #dfe5ec;
  border-radius:22px;
  box-shadow:0 20px 50px rgba(17,20,27,.18);
  padding:20px;
}
.modalCard h3{
  margin:0 0 8px;
  font-size:24px;
  letter-spacing:-.03em;
  color:#171c26;
}
.modalCard p{
  margin:0 0 14px;
  color:#5a6473;
  font-size:13px;
  line-height:1.45;
}
.modalField label{
  display:block;
  margin-bottom:8px;
  font-size:11px;
  letter-spacing:.08em;
  color:#6b7482;
  font-weight:900;
}
.modalField input{
  width:100%;
  min-height:48px;
  border:1px solid #d8dee7;
  border-radius:14px;
  padding:0 14px;
  font-size:16px;
  font-weight:700;
  color:#171c26;
  outline:none;
}
.modalField input:focus{border-color:#c9002b;box-shadow:0 0 0 4px rgba(201,0,43,.08)}
.modalActions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:16px;
}
.modalBtn{
  min-height:42px;
  padding:0 16px;
  border-radius:12px;
  border:1px solid #d8dee7;
  background:#f5f7fa;
  color:#171c26;
  font-weight:900;
  cursor:pointer;
}
.modalBtn.primary{
  background:#c9002b;
  border-color:#c9002b;
  color:#fff;
}
.empty{
  min-height:420px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
  color:var(--muted);
  font-size:18px;
}
@media (max-width:900px){
  .wrap{padding:10px}
  .hero{min-height:68px;padding:12px 56px}
  .heroLogo{width:70%}
  .panel{min-height:360px;border-radius:22px}
  .pautaHead{min-height:62px;padding:10px 14px}
  .pautaTime{width:92px;flex-basis:92px;font-size:34px}
  .pautaProgram{width:calc(100% - 168px);font-size:23px;color:#5B6675;font-weight:950;text-shadow:0 1px 1px rgba(255,255,255,.20),0 2px 8px rgba(39,48,62,.08)}
  .headNav{gap:10px}
  .iconNav{font-size:26px}
  .pautaBody{min-height:298px;padding:22px 20px;gap:12px}
  .titleBox,.descBox,.winnerBox{padding:16px 18px;border-radius:16px}
  .title{font-size:28px}
  .desc{font-size:17px}
  .winnerName{font-size:22px}
  .pautaActions{justify-content:center}
  .winnerBtn{justify-content:center}
  .promoFooter{min-height:42px;padding:5px 8px}
  .promoFooterList{width:100%}
  .promoPill{max-width:100%}
  .promoList{right:-40px;width:260px}
}
@media print{
  body{background:#fff}
  .hero,.backIcon,.headNav{display:none}
  .panel{box-shadow:none;border:0;border-radius:0}
}

/* FONTE DE CABEÇALHOS — LEMON MILK */
.pautaProgram,
.modalCard h3,
.promoListBtn,
.winnerLabel,
.promoFooter,
.promoListItem{
  font-family:"LEMON MILK Bold","LEMON MILK","LEMONMILK-Bold","Bahnschrift","Segoe UI",Arial,sans-serif;
  font-weight:900;
}


/* AJUSTE FINAL VISÍVEL — CABEÇALHO ESTÚDIO */
.pautaTime{
  font-family:"LEMON MILK Bold","LEMON MILK","LEMONMILK-Bold","Bahnschrift","Segoe UI Semibold","Segoe UI",Arial,sans-serif !important;
  font-weight:900 !important;
  font-size:52px !important;
  letter-spacing:-.025em !important;
  color:#6ED7A0 !important;
  text-shadow:none !important;
  -webkit-text-stroke:0 !important;
  -webkit-font-smoothing:antialiased !important;
  -moz-osx-font-smoothing:grayscale !important;
  text-rendering:geometricPrecision !important;
  font-variant-numeric:lining-nums tabular-nums !important;
}
.pautaProgram{
  font-family:"LEMON MILK Bold","LEMON MILK","LEMONMILK-Bold","Bahnschrift","Segoe UI",Arial,sans-serif !important;
  font-weight:900 !important;
  font-size:30px !important;
  letter-spacing:-.02em !important;
  color:#5B6675 !important;
  -webkit-text-stroke:0 !important;
  text-shadow:0 1px 1px rgba(255,255,255,.20), 0 2px 8px rgba(39,48,62,.08) !important;
}
@media (max-width:760px){
  .pautaTime{font-size:36px !important}
  .pautaProgram{font-size:23px !important}
}


/* AJUSTE FINAL — CORES DO CABEÇALHO */
.pautaProgram{
  color:#6A7481 !important;
  text-shadow:0 1px 1px rgba(255,255,255,.22), 0 2px 8px rgba(39,48,62,.08) !important;
}
.pautaTime{
  color:inherit !important;
}
.pautaTime.time-now{
  color:#74D2A0 !important;
}
.pautaTime.time-past{
  color:#D77983 !important;
}
.pautaTime.time-next{
  color:#E2A455 !important;
}


/* AJUSTE — TELA DO ESTÚDIO +15% */
.pautaHead{min-height:84px !important}
.pautaTime{
  width:148px !important;
  flex-basis:148px !important;
  font-size:60px !important;
}
.pautaProgram{
  width:calc(100% - 360px) !important;
  font-size:35px !important;
}
.pautaBody{
  min-height:390px !important;
  gap:18px !important;
  padding:32px 42px 36px !important;
}
.titleBox,.descBox{
  padding:23px 28px !important;
}
.title{
  font-size:44px !important;
  line-height:1.06 !important;
}
.desc{
  font-size:23px !important;
  line-height:1.52 !important;
}
.winnerLabel{font-size:14px !important}
.winnerName{font-size:30px !important}
.promoFooter{min-height:52px !important}
.promoPill{
  font-size:10.5px !important;
  min-height:20px !important;
}
.navSmall{
  font-size:13px !important;
}
@media (max-width:760px){
  .pautaHead{min-height:78px !important}
  .pautaTime{width:116px !important;flex-basis:116px !important;font-size:42px !important}
  .pautaProgram{font-size:26px !important;width:calc(100% - 220px) !important}
  .title{font-size:34px !important}
  .desc{font-size:20px !important}
}


/* AJUSTE — HISTÓRICO, RESULTADO E LEITURA +15% */
.pautaHead{min-height:92px !important}
.pautaTime{width:156px !important;flex-basis:156px !important;font-size:64px !important}
.pautaProgram{width:calc(100% - 410px) !important;font-size:39px !important}
.title{font-size:48px !important;line-height:1.06 !important}
.desc{font-size:25px !important;line-height:1.5 !important}
.promoReadDesc{font-size:15px !important}
.promoListBtn.history{color:#6c7481}
.resultBox{
  width:min(740px,100%);
  display:grid;
  gap:8px;
  padding:14px;
  border:1px solid #dfe5ec;
  border-radius:16px;
  background:#f7f8fb;
}
.resultBox label{
  font-size:11px;
  font-weight:1000;
  letter-spacing:.08em;
  color:#5b6675;
}
.resultLine{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:8px;
}
.resultLine input{
  min-height:44px;
  border:1px solid #d8dee7;
  border-radius:13px;
  padding:0 13px;
  font-size:15px;
  font-weight:900;
  color:#171c26;
  text-transform:uppercase;
}
.resultSaved{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  width:max-content;
  max-width:100%;
  border-radius:999px;
  border:1px solid #ccefdc;
  background:#effaf4;
  color:#137947;
  padding:0 10px;
  font-size:11px;
  font-weight:1000;
}
.historyCard{width:min(860px,100%)}
.historyTop{
  display:flex;
  gap:10px;
  align-items:end;
  margin:12px 0 14px;
}
.historyTop .modalField{flex:0 0 180px}
.historyList{
  max-height:58vh;
  overflow:auto;
  display:grid;
  gap:8px;
}
.historyItem{
  border:1px solid #e2e7ef;
  border-radius:15px;
  background:#f8f9fc;
  padding:11px 12px;
  display:grid;
  grid-template-columns:88px minmax(0,1fr);
  gap:10px;
}
.historyTime{
  font-size:24px;
  font-weight:1000;
  color:#697386;
  display:flex;
  align-items:center;
}
.historyInfo strong{
  display:block;
  color:#171c26;
  font-size:14px;
  font-weight:1000;
  line-height:1.2;
}
.historyInfo span{
  display:block;
  margin-top:4px;
  color:#5a6473;
  font-size:11px;
  font-weight:900;
  line-height:1.35;
}
.historyInfo em{
  display:inline-flex;
  margin-top:7px;
  border-radius:999px;
  border:1px solid #ccefdc;
  background:#effaf4;
  color:#137947;
  padding:4px 8px;
  font-size:10px;
  font-style:normal;
  font-weight:1000;
}
@media (max-width:760px){
  .pautaTime{width:124px !important;flex-basis:124px !important;font-size:45px !important}
  .pautaProgram{width:calc(100% - 265px) !important;font-size:29px !important}
  .title{font-size:37px !important}
  .desc{font-size:22px !important}
  .resultLine{grid-template-columns:1fr}
}


/* AJUSTE — MÚLTIPLOS GANHADORES DO SORTEIO */
.resultWinnersList{
  display:grid;
  gap:8px;
}
.resultWinnerLine{
  display:grid;
  grid-template-columns:minmax(0,1fr) 44px;
  gap:8px;
}
.resultWinnerLine input{
  min-height:44px;
  border:1px solid #d8dee7;
  border-radius:13px;
  padding:0 13px;
  font-size:15px;
  font-weight:900;
  color:#171c26;
  text-transform:uppercase;
}
.resultAddBtn,.resultRemoveBtn{
  min-height:44px;
  border:1px solid #d8dee7;
  border-radius:13px;

function pickStudioFields(record,fields){

  return patch;
}
async function persistStudioRecord(collection,record,fields){

    const index=rows.findIndex(row=>row?.id===record.id);

function apiJsonp(params={}){
  return new Promise((resolve,reject)=>{
    if(!LEGACY_API_URL) return reject(new Error('LEGACY_API_URL NÃO CONFIGURADA.'));
    const callback='jpStudioLegacyApiCb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const query=new URLSearchParams({...params,callback,t:Date.now()});
    const script=document.createElement('script');
    let done=false;
    const cleanup=()=>{try{delete window[callback];}catch(e){window[callback]=undefined;} script.remove();};
    const timer=setTimeout(()=>{if(done)return;done=true;cleanup();reject(new Error('TEMPO ESGOTADO AO CARREGAR API LEGADA.'));},18000);
    window[callback]=(payload)=>{if(done)return;done=true;clearTimeout(timer);cleanup();resolve(payload);};
    script.onerror=()=>{if(done)return;done=true;clearTimeout(timer);cleanup();reject(new Error('FALHA AO CARREGAR API LEGADA.'));};
    script.src=LEGACY_API_URL+'?'+query.toString();
    document.head.appendChild(script);
  });
}
async function importLegacyStateToFirebase(){
  try{
    const payload=await apiJsonp({action:'load'});
    if(payload && payload.ok && payload.state && payload.state.months && countStateRecords(payload.state)>0){
      state=payload.state;
      selectStudioMonth();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
      await saveStateToApi();
      return true;
    }
  }catch(err){
    console.warn('IMPORTAÇÃO LEGADA NÃO CONCLUÍDA',err);
  }
  return false;
}
function applyRemoteFirebaseState(remoteState){
  if(!remoteState || !remoteState.months) return;
  firebaseApplyingRemote=true;
  state=remoteState;
  firebaseServerLoaded=true;
  selectStudioMonth();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(!manual) selectedIndex=-1;
  render();
  firebaseApplyingRemote=false;
}
async function handleEmptyFirebase(){
  // Firebase é a fonte oficial. O estúdio não envia cache local quando o servidor está vazio.
  firebaseServerLoaded=true;
  render();
}
function initFirebaseSync(){
  if(firebaseStarted) return;
  firebaseStarted=true;
  if(!firebaseConfigReady()){
    console.warn('Firebase ainda não configurado. Substitua FIREBASE_CONFIG nos arquivos HTML.');
    return;
  }
  try{
    const app=window.firebase.apps && window.firebase.apps.length ? window.firebase.app() : window.firebase.initializeApp(FIREBASE_CONFIG);
    firebaseRef=window.firebase.database(app).ref(FIREBASE_ROOT_PATH);
    firebaseReady=true;
    firebaseRef.on('value', async snapshot=>{
      const payload=snapshot.val();
      if(!payload || !payload.state){
        await handleEmptyFirebase();
        return;
      }
      if(firebasePendingSave && Date.now()-firebaseLastLocalWrite<1200) return;
      applyRemoteFirebaseState(payload.state);
      firebasePendingSave=false;
    },err=>console.warn('FIREBASE LOAD ERROR',err));
  }catch(err){
    console.warn('FIREBASE INIT ERROR',err);
  }
}
function syncStateFromApi(force=false){
  initFirebaseSync();
  if(force && firebaseReady && firebaseRef){
    firebaseRef.get().then(snapshot=>{
      const payload=snapshot.val();
      if(payload && payload.state) applyRemoteFirebaseState(payload.state);
    }).catch(err=>console.warn('FIREBASE FORCE LOAD ERROR',err));
  }
}
function queueApiSave(delay=250){
  clearTimeout(firebaseSaveTimer);
  firebaseSaveTimer=setTimeout(saveStateToApi,delay);
}
async function saveStateToApi(){
  if(!firebaseReady || !firebaseRef){
    initFirebaseSync();
    if(!firebaseReady || !firebaseRef) return;
  }
  try{
    if(countStateRecords(state)===0){
      firebasePendingSave=false;
      console.warn('ENVIO BLOQUEADO: BASE DO ESTÚDIO VAZIA.');
      return;
    }
    await firebaseRef.set({
      state,
      updatedAt: window.firebase.database.ServerValue.TIMESTAMP,
      savedAt: new Date().toISOString(),
      source: 'PAINEL_ESTUDIO',
      user: 'JOVEM_PAN_FLORIPA',
      version: 'FIREBASE_RTDB_V1'
    });
    firebaseServerLoaded=true;
    firebasePendingSave=false;
  }catch(err){
    console.warn('FIREBASE SAVE ERROR',err);
  }
}

function winnerPlain(value){
  return upper(value).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9 ]+/g,' ').replace(/\s+/g,' ').trim();
}
const WINNER_SIMILARITY_MIN=0.86;
const WINNER_NAME_PARTICLES=new Set(['DA','DAS','DE','DO','DOS','E']);
function winnerNameProfile(value){
  const plain=winnerPlain(value);
  const tokens=plain.split(' ').filter(Boolean);
  const filtered=tokens.filter(token=>!WINNER_NAME_PARTICLES.has(token));
  const core=filtered.length?filtered:tokens;
  return {plain,tokens,core,compact:core.join(''),sorted:[...core].sort().join(' '),first:core[0]||'',last:core[core.length-1]||''};
}
function winnerLevenshtein(a,b){
  const left=String(a||''),right=String(b||'');
  if(left===right) return 0;
  if(!left.length) return right.length;
  if(!right.length) return left.length;
  let previous=Array.from({length:right.length+1},(_,index)=>index);
  for(let i=1;i<=left.length;i+=1){
    const current=[i];
    for(let j=1;j<=right.length;j+=1){
      current[j]=Math.min(current[j-1]+1,previous[j]+1,previous[j-1]+(left[i-1]===right[j-1]?0:1));
    }
    previous=current;
  }
  return previous[right.length];
}
function winnerEditSimilarity(a,b){
  const max=Math.max(String(a||'').length,String(b||'').length);
  return max?1-(winnerLevenshtein(a,b)/max):1;
}
function winnerJaroWinkler(a,b){
  const left=String(a||''),right=String(b||'');
  if(left===right) return 1;
  if(!left.length||!right.length) return 0;
  const range=Math.max(0,Math.floor(Math.max(left.length,right.length)/2)-1);
  const leftMatches=new Array(left.length).fill(false);
  const rightMatches=new Array(right.length).fill(false);
  let matches=0;
  for(let i=0;i<left.length;i+=1){
    const start=Math.max(0,i-range);
    const end=Math.min(i+range+1,right.length);
    for(let j=start;j<end;j+=1){
      if(rightMatches[j]||left[i]!==right[j]) continue;
      leftMatches[i]=true;
      rightMatches[j]=true;
      matches+=1;
      break;
    }
  }
  if(!matches) return 0;
  const leftOrdered=[],rightOrdered=[];
  leftMatches.forEach((matched,index)=>{ if(matched) leftOrdered.push(left[index]); });
  rightMatches.forEach((matched,index)=>{ if(matched) rightOrdered.push(right[index]); });
  let transpositions=0;
  leftOrdered.forEach((char,index)=>{ if(char!==rightOrdered[index]) transpositions+=1; });
  const jaro=((matches/left.length)+(matches/right.length)+((matches-transpositions/2)/matches))/3;
  let prefix=0;
  while(prefix<4&&prefix<left.length&&prefix<right.length&&left[prefix]===right[prefix]) prefix+=1;
  return jaro+(prefix*.1*(1-jaro));
}
function winnerTokenSimilarity(leftTokens,rightTokens){
  if(!leftTokens.length||!rightTokens.length) return 0;
  const shorter=leftTokens.length<=rightTokens.length?leftTokens:rightTokens;
  const longer=leftTokens.length<=rightTokens.length?rightTokens:leftTokens;
  const average=shorter.reduce((total,token)=>{
    const best=longer.reduce((score,candidate)=>Math.max(score,winnerEditSimilarity(token,candidate)),0);
    return total+best;
  },0)/shorter.length;
  const coverage=shorter.length/longer.length;
  return average*(.88+.12*coverage);
}
function winnerNameSimilarity(leftName,rightName){
  const left=winnerNameProfile(leftName),right=winnerNameProfile(rightName);
  if(!left.plain||!right.plain) return 0;
  if(left.plain===right.plain) return 1;
  if(left.sorted&&left.sorted===right.sorted) return .99;
  const jaro=winnerJaroWinkler(left.compact,right.compact);
  const edit=winnerEditSimilarity(left.compact,right.compact);
  const token=winnerTokenSimilarity(left.core,right.core);
  let score=(jaro*.43)+(edit*.24)+(token*.33);
  const shorter=left.core.length<=right.core.length?left.core:right.core;
  const longer=left.core.length<=right.core.length?right.core:left.core;
  const contained=shorter.length>=2&&shorter.every(tokenValue=>longer.some(candidate=>winnerEditSimilarity(tokenValue,candidate)>=.92));
  if(contained) score=Math.max(score,.86+(.1*(shorter.length/longer.length)));
  const firstScore=winnerEditSimilarity(left.first,right.first);
  const lastScore=winnerEditSimilarity(left.last,right.last);
  if(firstScore<.55&&lastScore<.72) score-=.12;
  else if(firstScore<.48) score-=.05;
  return Math.max(0,Math.min(1,score));
}
function winnerSimilarityCandidates(name,limit=3){
  const profile=winnerNameProfile(name);
  if(profile.plain.length<4) return [];
  const inputKey=winnerPersonKey(name);
  const people=new Map();
  winnerBankRecords.forEach(record=>{
    const candidateName=upper(record.name);
    const candidateKey=record.personKey||winnerPersonKey(candidateName);
    if(candidateName&&candidateKey&&!people.has(candidateKey)) people.set(candidateKey,{name:candidateName,key:candidateKey});
  });
  const threshold=profile.core.length<=1?.94:WINNER_SIMILARITY_MIN;
  return [...people.values()].map(candidate=>{
    if(candidate.key===inputKey) return null;
    const score=winnerNameSimilarity(name,candidate.name);
    return score>=threshold?{...candidate,score}:null;
  }).filter(Boolean).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name,'pt-BR')).slice(0,limit);
}
function winnerPersonKey(name){
  return winnerPlain(name).replace(/\s+/g,'_').slice(0,180);
}
function winnerPrizeKey(prize){
  return winnerPlain(prize).replace(/\s+/g,'_').slice(0,220);
}
function winnerRecordList(value){
  if(Array.isArray(value)) return value.filter(Boolean).map((row,index)=>({...row,id:row.id||`LEGACY_${index}`}));
  if(value&&typeof value==='object') return Object.entries(value).map(([key,row])=>({...row,id:row?.id||key})).filter(row=>row.name&&row.date);
  return [];
}
function winnerRecordMap(value){
  const map={};
  winnerRecordList(value).forEach((record,index)=>{ const key=record.id||`LEGACY_${index}`; map[key]={...record,id:key}; });
  return map;
}
function winnerAddMonthsISO(iso,months=WINNER_BLOCK_MONTHS){
  const [year,month,day]=String(iso||'').split('-').map(Number);
  if(!year||!month||!day) return '';
  const first=new Date(year,month-1+months,1,12);
  const lastDay=new Date(first.getFullYear(),first.getMonth()+1,0,12).getDate();
  const result=new Date(first.getFullYear(),first.getMonth(),Math.min(day,lastDay),12);
  return `${result.getFullYear()}-${String(result.getMonth()+1).padStart(2,'0')}-${String(result.getDate()).padStart(2,'0')}`;
}
function winnerCycleInfo(records,asOf=todayISO()){
  const sorted=[...records].filter(record=>record?.date&&record.date<=asOf).sort((a,b)=>String(a.date).localeCompare(String(b.date))||String(a.createdAt||'').localeCompare(String(b.createdAt||'')));
  let cycleCount=0;
  let blockedUntil='';
  sorted.forEach(record=>{
    if(blockedUntil&&record.date>=blockedUntil){ cycleCount=0; blockedUntil=''; }
    if(blockedUntil&&record.date<blockedUntil) return;
    cycleCount+=1;
    if(cycleCount===3) blockedUntil=winnerAddMonthsISO(record.date);
  });
  if(blockedUntil&&asOf>=blockedUntil){ cycleCount=0; blockedUntil=''; }
  return {cycleCount,blocked:!!blockedUntil,blockedUntil};
}
function winnerEvaluateAgainst(records,name,prize,asOf=todayISO()){
  const personKey=winnerPersonKey(name);
  const history=records
    .filter(record=>(record.personKey||winnerPersonKey(record.name))===personKey)
    .filter(record=>!record.date||record.date<=asOf)
    .sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))||String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
  const cycle=winnerCycleInfo(history,asOf);
  const prizeKey=winnerPrizeKey(prize);
  const samePrize=!!prizeKey&&history.some(record=>(record.prizeKey||winnerPrizeKey(record.prize))===prizeKey);
  let status='APTO';
  let title=history.length?'APTO':'PRIMEIRA PREMIAÇÃO / APTO';
  let reason=history.length?'OUVINTE LIBERADO PARA NOVA PREMIAÇÃO.':'NENHUM HISTÓRICO LOCALIZADO PARA ESTE NOME.';
  if(samePrize){
    const previous=history.find(record=>(record.prizeKey||winnerPrizeKey(record.prize))===prizeKey);
    status='BLOQUEADO';
    title='JÁ GANHOU ESTE PRÊMIO';
    reason=previous?`MESMO PRÊMIO REGISTRADO EM ${formatBR(previous.date)} · ${upper(previous.program||'PROGRAMA')}.`:'ESTE PRÊMIO JÁ CONSTA NO HISTÓRICO.';
  }else if(cycle.blocked){
    status='BLOQUEADO';
    title='BLOQUEADO';
    reason=`LIBERAÇÃO AUTOMÁTICA EM ${formatBR(cycle.blockedUntil)}.`;
  }else if(cycle.cycleCount===2){
    status='ATENCAO';
    title='ATENÇÃO — ESTA SERÁ A 3ª PREMIAÇÃO';
    reason='A CONFIRMAÇÃO INICIARÁ O BLOQUEIO DE 8 MESES.';
  }
  return {name:upper(name),personKey,history,total:history.length,cycleCount:cycle.cycleCount,blockedUntil:cycle.blockedUntil,samePrize,status,title,reason,allowed:status!=='BLOQUEADO'};
}
function winnerContextForItem(item){
  return {sourceRef:`ITEM:${item?.id||''}`,date:item?.date||todayISO(),program:upper(item?.program||programFromSchedule(item?.date||todayISO(),item?.slot||'',STUDIO_STATION)||'PROGRAMA'),prize:upper(item?.prize||item?.title||'PRÊMIO')};
}
function winnerContextForPromo(promo,item){
  const date=item?.date||promo?.drawDate||todayISO();
  const slot=formatStudioTime(item?.slot||promo?.drawTime||'');
  return {sourceRef:`PROMO:${promo?.id||''}:${date}:${slot}`,date,program:upper(item?.program||programFromSchedule(date,slot,STUDIO_STATION)||promo?.program||'RESULTADO PROMOÇÃO'),prize:upper(promo?.prize||promo?.name||promo?.title||item?.prize||'PROMOÇÃO')};
}
function winnerSuggestions(name){
  return winnerSimilarityCandidates(name,5);
}
function winnerSimilarityRejected(field,name){
  const inputKey=winnerPersonKey(name);
  if(field.dataset.similarityInputKey!==inputKey){
    field.dataset.similarityInputKey=inputKey;
    field.dataset.similarityRejected='';
  }
  return new Set(String(field.dataset.similarityRejected||'').split(',').filter(Boolean));
}
function winnerSuggestionsForField(field,name){
  const rejected=winnerSimilarityRejected(field,name);
  return winnerSuggestions(name).filter(candidate=>!rejected.has(candidate.key));
}
function resolveStudioWinnerSimilarity(input,button,validate){
  if(!input||!button) return;
  const action=button.dataset.winnerSimilarity;
  const candidateKey=button.dataset.candidateKey||'';
  if(action==='same'){
    input.value=upper(button.dataset.candidateName||'');
    input.dataset.similarityInputKey=winnerPersonKey(input.value);
    input.dataset.similarityRejected='';
  }else{
    const rejected=winnerSimilarityRejected(input,input.value);
    rejected.add(candidateKey);
    input.dataset.similarityRejected=[...rejected].join(',');
  }
  validate();
  input.focus();
}

  const box=$('winnerBankModalState');
  if(!box) return;
  box.className=`winnerBankModalState ${mode||''}`.trim();
  box.textContent=text;
}
function applyWinnerBankSnapshot(value){
  winnerBankRecords=winnerRecordList(value?.records??value??{}).map(record=>({...record,name:upper(record.name),program:upper(record.program),prize:upper(record.prize),personKey:record.personKey||winnerPersonKey(record.name),prizeKey:record.prizeKey||winnerPrizeKey(record.prize)}));
  winnerBankReady=value?.initialized===true||winnerBankRecords.length>0;
  if(winnerBankReady) setWinnerBankModalState('online',`BANCO FIREBASE CONECTADO · ${winnerBankRecords.length} PREMIAÇÃO(ÕES) NO HISTÓRICO.`);
  else setWinnerBankModalState('error','IMPORTAÇÃO INICIAL PENDENTE. A CONFIRMAÇÃO DE GANHADORES ESTÁ BLOQUEADA.');
  if($('winnerModal')?.classList.contains('show')) validateAllWinnerInputs();
  if($('promoResultWinnersList')) validateAllPromoWinnerInputs();
}
function initWinnerBank(force=false){
  if(!firebaseConfigReady()){
    winnerBankReady=false;
    setWinnerBankModalState('error','BANCO DE GANHADORES INDISPONÍVEL. A CONFIRMAÇÃO ESTÁ BLOQUEADA.');
    updateWinnerSaveState();
    return;
  }
  try{
    const app=window.firebase.apps&&window.firebase.apps.length?window.firebase.app():window.firebase.initializeApp(FIREBASE_CONFIG);
    winnerBankRef=window.firebase.database(app).ref(WINNER_BANK_PATH);
    if(!winnerBankStarted){
      winnerBankStarted=true;
      winnerBankRef.on('value',snapshot=>applyWinnerBankSnapshot(snapshot.val()||{}),error=>{
        console.error('WINNER BANK LOAD ERROR',error);
        winnerBankReady=false;
        setWinnerBankModalState('error','ERRO AO CONSULTAR O BANCO. A CONFIRMAÇÃO ESTÁ BLOQUEADA.');
        updateWinnerSaveState();
      });
    }
    if(force){
      setWinnerBankModalState('','ATUALIZANDO BANCO DE GANHADORES...');
      winnerBankRef.get().then(snapshot=>applyWinnerBankSnapshot(snapshot.val()||{})).catch(error=>{
        console.error('WINNER BANK REFRESH ERROR',error);
        winnerBankReady=false;
        setWinnerBankModalState('error','NÃO FOI POSSÍVEL ATUALIZAR O BANCO. A CONFIRMAÇÃO ESTÁ BLOQUEADA.');
        updateWinnerSaveState();
      });
    }
  }catch(error){
    console.error('WINNER BANK INIT ERROR',error);
    winnerBankReady=false;
    setWinnerBankModalState('error','ERRO AO INICIAR O BANCO. A CONFIRMAÇÃO ESTÁ BLOQUEADA.');
    updateWinnerSaveState();
  }
}
function winnerEligibilityHtml(result,suggestions=[]){
  if(!result) return '<div class="winnerEligibilityHead"><strong>DIGITE O NOME COMPLETO PARA CONSULTAR</strong><span>AGUARDANDO</span></div><p>A PESQUISA SERÁ FEITA AUTOMATICAMENTE NO HISTÓRICO DO FIREBASE.</p>';
  const history=result.history.map(record=>`<div><strong>${formatBR(record.date)}</strong><span>${esc(upper(record.program||'PROGRAMA'))}</span><span>${esc(upper(record.prize||'PRÊMIO'))}</span></div>`).join('');
  const candidate=suggestions[0];
  const suggestionHtml=candidate?`<div class="winnerSuggestions"><div class="winnerSimilarityPrompt">POSSÍVEL CADASTRO EXISTENTE — CONFIRME ANTES DE CONTINUAR</div><div class="winnerSimilarityCompare"><div class="winnerSimilarityName"><span>NOME DIGITADO</span><b>${esc(result.name)}</b></div><span class="winnerSimilarityScore">${Math.round(candidate.score*100)}% PARECIDO</span><div class="winnerSimilarityName"><span>NOME NO FIREBASE</span><b>${esc(candidate.name)}</b></div></div><div class="winnerSimilarityActions"><button class="winnerSuggestion same" type="button" data-winner-similarity="same" data-candidate-key="${esc(candidate.key)}" data-candidate-name="${esc(candidate.name)}">É A MESMA PESSOA</button><button class="winnerSuggestion" type="button" data-winner-similarity="different" data-candidate-key="${esc(candidate.key)}">SÃO PESSOAS DIFERENTES</button></div></div>`:result.similarityDifferent?'<div class="winnerSimilarityDone">REVISÃO CONCLUÍDA: PESSOAS DIFERENTES.</div>':'';
  const statusLabel=result.status==='ATENCAO'?'ATENÇÃO':result.status;
  const located=result.total?`NOME LOCALIZADO: ${result.name}. `:'';
  return `<div class="winnerEligibilityHead"><strong>${esc(result.title)}</strong><span>${esc(statusLabel)} · ${result.total} PREMIAÇÃO(ÕES)</span></div><p>${esc(located+result.reason)}</p>${history?`<div class="winnerEligibilityHistory">${history}</div>`:''}${suggestionHtml}`;
}
function validateAllWinnerInputs(){
  const item=currentItemRecord();
  const fields=Array.from(document.querySelectorAll('.winnerNameField'));
  if(!item||!fields.length){ winnerInputChecks=[]; updateWinnerSaveState(); return; }
  const context=winnerContextForItem(item);
  const counts=new Map();
  fields.forEach(field=>{ const key=winnerPersonKey(field.value); if(key) counts.set(key,(counts.get(key)||0)+1); });
  winnerInputChecks=fields.map((field,index)=>{
    const name=upper(field.value);
    const host=$(`winnerEligibility${index}`);
    if(!name){
      if(host){ host.className='winnerEligibility neutral'; host.innerHTML=winnerEligibilityHtml(null); }
      return {name:'',allowed:false,status:'PENDENTE'};
    }
    const availableHistory=winnerBankRecords.filter(record=>!(record.source==='ESTUDIO_JP1017'&&record.sourceRef===context.sourceRef));
    const rejected=winnerSimilarityRejected(field,name);
    const suggestions=winnerSuggestionsForField(field,name);
    let result=winnerEvaluateAgainst(availableHistory,name,context.prize,context.date);
    if(!result.total&&suggestions.length) result={...result,status:'PENDENTE',title:'POSSÍVEL CADASTRO EXISTENTE',reason:'CONFIRME SE É A MESMA PESSOA OU SE SÃO PESSOAS DIFERENTES.',allowed:false};
    else if(!result.total&&rejected.size) result={...result,similarityDifferent:true,reason:`${result.reason} REVISÃO DE NOME CONCLUÍDA.`};
    if((counts.get(result.personKey)||0)>1) result={...result,status:'BLOQUEADO',title:'NOME REPETIDO NESTE SORTEIO',reason:'CADA PESSOA DEVE APARECER APENAS UMA VEZ.',allowed:false};
    if(!winnerBankReady) result={...result,status:'BLOQUEADO',title:'CONSULTA INDISPONÍVEL',reason:'AGUARDE A CONEXÃO COM O FIREBASE ANTES DE CONFIRMAR.',allowed:false};
    if(host){ host.className=`winnerEligibility ${result.status==='ATENCAO'?'atencao':result.status==='BLOQUEADO'?'bloqueado':result.status==='PENDENTE'?'neutral':'apto'}`; host.innerHTML=winnerEligibilityHtml(result,suggestions); }
    return result;
  });
  updateWinnerSaveState();
}
function updateWinnerSaveState(){
  const button=$('saveWinnerBtn');
  if(!button) return;
  const fields=Array.from(document.querySelectorAll('.winnerNameField'));
  const ready=winnerBankReady&&fields.length>0&&winnerInputChecks.length===fields.length&&winnerInputChecks.every(check=>check.name&&check.allowed);
  button.disabled=!ready;
  button.title=ready?'CONFIRMAR E REGISTRAR NO FIREBASE':'TODOS OS GANHADORES PRECISAM ESTAR APTOS E VALIDADOS';
}
async function commitWinnerHistory(names,context){
  initWinnerBank();
  if(!winnerBankReady||!winnerBankRef) throw new Error('BANCO DE GANHADORES INDISPONÍVEL.');
  const now=new Date();
  const ids=names.map(()=>winnerBankRef.child('records').push().key);
  let rejection=null;
  const result=await winnerBankRef.child('records').transaction(current=>{
    rejection=null;
    const map=winnerRecordMap(current||{});
    Object.keys(map).forEach(key=>{
      const record=map[key];
      if(record.source==='ESTUDIO_JP1017'&&record.sourceRef===context.sourceRef) delete map[key];
    });
    const working=winnerRecordList(map);

function minutesOf(time){

  if(hMatch) return Number(hMatch[1])*60;
  const m=raw.match(/(\d{1,2}):(\d{2})/);

}
function mergeWinnerDelivery(previous,next){
  const prev=normalizeWinnerList(previous);
  const prevMap=new Map(prev.map(w=>[w.name,w]));
  return normalizeWinnerList(next).map(w=>{
    const old=prevMap.get(w.name);
    return old ? {...w,registeredAt:old.registeredAt||w.registeredAt||'',registeredAtLabel:old.registeredAtLabel||w.registeredAtLabel||'',deliveredAt:old.deliveredAt||'',deliveredAtLabel:old.deliveredAtLabel||'',deliveredBy:old.deliveredBy||'',reuseStatus:old.reuseStatus||'',reuseAt:old.reuseAt||'',reuseAtLabel:old.reuseAtLabel||'',reusedItemId:old.reusedItemId||''} : w;
  });
}

function updatePromoWinnerSaveState(){

function validateAllPromoWinnerInputs(){
  const promo=currentPromoForRead();
  const item=currentDisplayItem||virtualCurrentItem();
  const fields=Array.from(document.querySelectorAll('.promoResultWinnerInput'));
  if(!promo||!item||!fields.length){ promoWinnerChecks=[]; updatePromoWinnerSaveState(); return; }
  const context=winnerContextForPromo(promo,item);
  const availableHistory=winnerBankRecords.filter(record=>!(record.source==='ESTUDIO_JP1017'&&record.sourceRef===context.sourceRef));
  const counts=new Map();
  fields.forEach(field=>{ const key=winnerPersonKey(field.value); if(key) counts.set(key,(counts.get(key)||0)+1); });
  promoWinnerChecks=fields.map((field,index)=>{
    const name=upper(field.value);
    const host=$(`promoWinnerEligibility${index}`);
    if(!name){ if(host){ host.className='winnerEligibility neutral promoWinnerEligibility'; host.innerHTML=winnerEligibilityHtml(null); } return {name:'',allowed:false,status:'PENDENTE'}; }
    const rejected=winnerSimilarityRejected(field,name);
    const suggestions=winnerSuggestionsForField(field,name);
    let result=winnerEvaluateAgainst(availableHistory,name,context.prize,context.date);
    if(!result.total&&suggestions.length) result={...result,status:'PENDENTE',title:'POSSÍVEL CADASTRO EXISTENTE',reason:'CONFIRME SE É A MESMA PESSOA OU SE SÃO PESSOAS DIFERENTES.',allowed:false};
    else if(!result.total&&rejected.size) result={...result,similarityDifferent:true,reason:`${result.reason} REVISÃO DE NOME CONCLUÍDA.`};
    if((counts.get(result.personKey)||0)>1) result={...result,status:'BLOQUEADO',title:'NOME REPETIDO NESTE SORTEIO',reason:'CADA PESSOA DEVE APARECER APENAS UMA VEZ.',allowed:false};
    if(!winnerBankReady) result={...result,status:'BLOQUEADO',title:'CONSULTA INDISPONÍVEL',reason:'AGUARDE A CONEXÃO COM O FIREBASE ANTES DE CONFIRMAR.',allowed:false};
    if(host){ host.className=`winnerEligibility promoWinnerEligibility ${result.status==='ATENCAO'?'atencao':result.status==='BLOQUEADO'?'bloqueado':result.status==='PENDENTE'?'neutral':'apto'}`; host.innerHTML=winnerEligibilityHtml(result,suggestions); }
    return result;
  });
  updatePromoWinnerSaveState();
}

async function savePromoResultInline(){

function historyRowsForDate(date){
  const rows=[];
  const pushRow=(row)=>{
    if(!row || !row.title) return;
    const dedupeKey=`${row.source||''}|${row.id||''}|${row.time||''}|${row.title||''}|${row.result||''}`;
    if(rows.some(r=>r.__dedupeKey===dedupeKey)) return;
    rows.push({...row,__dedupeKey:dedupeKey});
  };

  (monthData().items||[])
    .filter(i=>i && i.date===date)
    .filter(i=>(i.station||'JP1017')===STUDIO_STATION)
    .filter(i=>upper(i.status)==='REALIZADO' || upper(i.winnerName||''))
    .forEach(i=>pushRow({
      source:'item',
      id:i.id||'',
      type:'PRÊMIO',
      typeClass:'prize',
      time:formatStudioTime(i.slot),
      sort:`${i.date}T${timeToHHMM(i.slot)}`,
      title:itemTitle(i),
      sub:i.program||'',
      result:upper(i.winnerName||'REALIZADO')
    }));

  (monthData().promos||[])
    .filter(p=>p && !isMerchan(p))
    .filter(p=>stationAllowed(p))
    .forEach(p=>{
      const title=upper(p.name||p.title||'PROMOÇÃO');
      const baseSub=upper(p.local||p.program||'PROMOÇÃO');
      const byHour=p.resultWinnersByHour||{};
      Object.entries(byHour).forEach(([key,list])=>{
        if(String(key).slice(0,10)!==date) return;
        const winners=normalizeWinnerList(list).map(w=>w.name).join(', ');
        if(!winners) return;
        const km=String(key).match(/-(\d{2})(\d{2})?$/);
        const keySlot=km ? `${km[1]}H${km[2]==='30'?'30':''}` : (p.resultSlot||p.drawTime||'');
        pushRow({
          source:'promo-hour-winners',
          id:p.id||'',
          type:'PROMOÇÃO',
          typeClass:'promo',
          time:formatStudioTime(keySlot),
          sort:`${date}T${timeToHHMM(keySlot)}`,
          title,
          sub:baseSub,
          result:winners
        });
      });

      Object.entries(p.resultByHour||{}).forEach(([key,value])=>{
        if(String(key).slice(0,10)!==date) return;
        const winner=upper(value||'');
        if(!winner) return;
        const km=String(key).match(/-(\d{2})(\d{2})?$/);
        const keySlot=km ? `${km[1]}H${km[2]==='30'?'30':''}` : (p.resultSlot||p.drawTime||'');
        pushRow({
          source:'promo-hour-result',
          id:p.id||'',
          type:'PROMOÇÃO',
          typeClass:'promo',
          time:formatStudioTime(keySlot),
          sort:`${date}T${timeToHHMM(keySlot)}`,
          title,
          sub:baseSub,
          result:winner
        });
      });

      const winners=promoWinnerList(p,null).map(w=>w.name).join(', ') || upper(p.resultName||'');
      const resultDate=p.resultDate || (p.resultName||winners ? p.drawDate : '');
      if(resultDate===date && winners){
        const slot=p.resultSlot || p.drawTime || '';
        const hour=pad(slotHour(slot));
        pushRow({
          source:'promo-result',
          id:p.id||'',
          type:'PROMOÇÃO',
          typeClass:'promo',
          time:formatStudioTime(slot),
          sort:`${date}T${hour||'23'}:00`,
          title,
          sub:baseSub,
          result:winners
        });
      }
    });

  return rows.sort((a,b)=>a.sort.localeCompare(b.sort)||a.title.localeCompare(b.title));
}

function isScheduledStudioPrize(item){
  if(!item || !item.date || !item.slot) return false;
  if((item.station||'JP1017')!==STUDIO_STATION) return false;
  const channel=upper(item.channel||'RÁDIO');
  if(channel && channel!=='RÁDIO') return false;
  if(upper(item.status||'')==='CANCELADO') return false;
  return !!(item.prize || item.title || item.distributionId);
}
function allPrizeRows(){
  const items=[...(monthData().items||[])]
    .filter(isScheduledStudioPrize);
  const virtualResults=promoResultVirtualRows();
  return [...items,...virtualResults]
    .sort((a,b)=>itemDateTime(a)-itemDateTime(b)||upper(a.program).localeCompare(upper(b.program)));
}
function sameHour(a,b){
  return a.getFullYear()===b.getFullYear() &&
         a.getMonth()===b.getMonth() &&
         a.getDate()===b.getDate() &&
         a.getHours()===b.getHours() &&
         a.getMinutes()===b.getMinutes();
}
function itemIndexForDate(rows,target){
  return rows.findIndex(i=>sameHour(itemDateTime(i),target));
}
function adaptiveItemIndexForDate(rows,target){
  const exact=itemIndexForDate(rows,target);
  if(exact>=0) return exact;

  // Se o bloco atual é de meia hora e não existe item às HH30,
  // mantém o prêmio da hora cheia durante a segunda metade da hora.
  if(target.getMinutes()>=30){
    const fullHour=new Date(target);
    fullHour.setMinutes(0,0,0);
    const fullIndex=itemIndexForDate(rows,fullHour);
    if(fullIndex>=0) return fullIndex;
  }
  return -1;
}
function itemForDate(rows,target){
  const idx=adaptiveItemIndexForDate(rows,target);
  if(idx>=0) return {idx,item:rows[idx],hasScheduledItem:true};
  return {idx:-1,item:virtualItemFromDate(target),hasScheduledItem:false};
}
function currentHourIndex(rows){
  return adaptiveItemIndexForDate(rows,currentSlotDate());
}
function autoIndex(rows){
  if(!rows.length)return -1;
  const now=new Date();
  const current=adaptiveItemIndexForDate(rows,currentSlotDate());
  if(current>=0)return current;
  const upcoming=rows.findIndex(i=>itemDateTime(i)>=now);
  if(upcoming>=0)return upcoming;
  return rows.length-1;
}
function timeClass(item){
  const now=new Date();
  const dt=itemDateTime(item);
  const active=itemForDate(allPrizeRows(),currentSlotDate()).item;
  if(item && active && !active.__virtual && item.id===active.id) return 'time-now';
  if(item?.__virtual && sameHour(dt,currentSlotDate())) return 'time-now';
  if(dt < now) return 'time-past';
  return 'time-next';
}
function currentItemRecord(){
  if(!currentDisplayItem || currentDisplayItem.__virtual) return null;
  return monthData().items?.find(i=>i.id===currentDisplayItem.id) || null;
}
function winnerCapacity(item){

  }
}
function step(delta){
  const base = manualHourDateMs !== null
    ? new Date(manualHourDateMs)
    : (currentDisplayItem ? hourDateFromItem(currentDisplayItem) : currentSlotDate());
  base.setMinutes(base.getMinutes()+(delta*30),0,0);
  manualHourDateMs=base.getTime();
  manual=true;
  selectedPromoId=null;
  render();
}

    item=found.item;
  }
  if(item && !item.__virtual) item.__hasScheduledPrize = item.sourceType!=='promo-result';
  currentDisplayItem=item;
  if(selectedPromoId && item && !allPautasForItemHour(item,true).some(p=>p.id===selectedPromoId)){
    selectedPromoId=null;
  }
  if(!selectedPromoId && item && item.sourceType==='promo-result' && item.promoId){
    selectedPromoId=item.promoId;
  }
  if(!selectedPromoId && item && item.__virtual){
    const pending=allPautasForItemHour(item,false);
    if(pending.length) selectedPromoId=pending[0].id;
  }
  const promo=currentPromoForRead();
  const isVirtual=!!item.__virtual;
  const winnerBlock = item.winnerName ? `<div class="winnerBox"><span class="winnerLabel">GANHADOR</span><strong class="winnerName">${esc(item.winnerName)}</strong></div>` : '';
  const promoBody = promo ? `
      <div class="promoReadBanner">${promo.imageData?`<img src="${promo.imageData}" alt="IMAGEM DA PROMOÇÃO">`:'IMAGEM DA PROMOÇÃO'}</div>
      <div class="titleBox"><h1 class="title" style="${inlineTextStyle(promo.titleStyle,'title')}">${esc(upper(promo.name||promo.title||(isMerchan(promo)?'MERCHAN':'PROMOÇÃO')))}</h1></div>
      <div class="descBox"><p class="desc" style="${inlineTextStyle(promo.descriptionStyle,'desc')}">${esc(promo.description||'SEM DESCRIÇÃO CADASTRADA.')}</p></div>
      ${shouldShowPromoResultBox(promo,currentDisplayItem || virtualCurrentItem())?buildPromoResultBox(promo,currentDisplayItem || virtualCurrentItem()):''}
      <div class="pautaActions"><button class="modalBtn" id="cancelPromoReadInline" type="button">VOLTAR</button><button class="modalBtn primary" id="confirmPromoReadInline" type="button" onclick="confirmPromoRead(event)">CONFIRMAR LEITURA</button></div>
    ` : isVirtual ? `
      <div class="emptyStudioBox"><strong>SEM PAUTA PARA ESTE HORÁRIO</strong><span>NENHUM PRÊMIO, PROMOÇÃO OU MERCHAN CADASTRADO PARA AGORA.</span></div>
    ` : `
      <div class="titleBox"><h1 class="title" style="${inlineTextStyle(itemTitleStyle(item),'title')}">${esc(itemTitle(item))}</h1></div>
      <div class="descBox"><p class="desc" style="${inlineTextStyle(itemDescStyle(item),'desc')}">${esc(itemDesc(item))}</p></div>
      ${winnerBlock}
      <div class="pautaActions"><button class="winnerBtn" id="markWinnerBtn" type="button" aria-label="${item.winnerName ? 'EDITAR GANHADOR' : 'INDICAR GANHADOR'}" title="${item.winnerName ? 'EDITAR GANHADOR' : 'INDICAR GANHADOR'}"><span class="trophy">🏆</span></button></div>
    `;
  $('pautaPanel').innerHTML=`
    <div class="pautaHead">
      <div class="pautaTime ${timeClass(item)}">${esc(formatStudioTime(item.slot))}</div>
      <div class="pautaProgram">${promo ? (isMerchan(promo)?'MERCHAN':'PROMO / PAUTA') : isVirtual ? 'SEM PAUTA' : esc(upper(item.program||'PROGRAMA'))}</div>
      <div class="headNav">
        ${ALLOW_PROMO_SHORTCUT ? `
        <div class="promoListWrap">
          <button class="promoListBtn ${promo&&!isMerchan(promo)?'active':''}" id="promoListBtn" type="button" onclick="studioShortcutClick(event,\'promo\')" aria-label="PROMOÇÕES" title="P = PROMOÇÕES">P<small>PROMO</small></button>
          <div class="promoList" id="promoList">${buildPromoList(item)}</div>
        </div>` : ''}
        <div class="promoListWrap">
          <button class="promoListBtn ${promo&&isMerchan(promo)?'active':''}" id="merchanListBtn" type="button" onclick="studioShortcutClick(event,\'merchan\')" aria-label="MERCHAN" title="M = MERCHAN">M<small>MERCHAN</small></button>
          <div class="promoList" id="merchanList">${buildMerchanList(item)}</div>
        </div>
        <button class="promoListBtn history" id="historyListBtn" type="button" onclick="studioShortcutClick(event,\'history\')" aria-label="SORTEIOS REALIZADOS" title="H = SORTEIOS REALIZADOS NO DIA">H<small>HIST.</small></button>
        <button class="iconNav" id="prevItem" type="button" aria-label="PAUTA ANTERIOR">‹</button>
        <button class="iconNav" id="nextItem" type="button" aria-label="PRÓXIMA PAUTA">›</button>
      </div>
    </div>
    ${buildStudioContext(item,promo)}
    <div class="pautaBody ${isVirtual&&!promo?'emptyState':''}">${promoBody}</div>
    ${buildPromoFooter(item)}`;
  $('prevItem').addEventListener('click',()=>{selectedPromoId=null;step(-1);});
  $('nextItem').addEventListener('click',()=>{selectedPromoId=null;step(1);});
  const winnerBtn=$('markWinnerBtn'); if(winnerBtn) winnerBtn.addEventListener('click',openWinnerModal);
  const cancelPromo=$('cancelPromoReadInline'); if(cancelPromo) cancelPromo.addEventListener('click',closePromoReadModal);
  const confirmPromo=$('confirmPromoReadInline'); if(confirmPromo) confirmPromo.onclick=confirmPromoRead;
  const savePromoResultBtn=$('savePromoResultInline'); if(savePromoResultBtn) savePromoResultBtn.addEventListener('click',savePromoResultInline);
  const resultList=$('promoResultWinnersList');
  if(resultList){
    resultList.addEventListener('input',e=>{ if(e.target.classList.contains('promoResultWinnerInput')) validateAllPromoWinnerInputs(); });
    resultList.addEventListener('click',e=>{
      const similarity=e.target.closest('[data-winner-similarity]');
      if(similarity){
        const candidate=similarity.closest('.promoWinnerCandidate');
        const input=candidate?.querySelector('.promoResultWinnerInput');
        resolveStudioWinnerSimilarity(input,similarity,validateAllPromoWinnerInputs);
        return;
      }
      const add=e.target.closest('.resultAddBtn');
      const remove=e.target.closest('.resultRemoveBtn');
      if(add) addPromoWinnerField('');
      if(remove){
        const candidate=remove.closest('.promoWinnerCandidate');
        const values=Array.from(resultList.querySelectorAll('.promoResultWinnerInput')).map(input=>input.value);
        const index=Array.from(resultList.querySelectorAll('.promoWinnerCandidate')).indexOf(candidate);
        if(index>=0) values.splice(index,1);
        resultList.innerHTML=(values.length?values:['']).map((name,rowIndex)=>promoWinnerInputRow({name},rowIndex)).join('');
        validateAllPromoWinnerInputs();
      }
    });
    setTimeout(validateAllPromoWinnerInputs,20);
  }
  const promoBtn=$('promoListBtn');
  if(promoBtn) promoBtn.onclick=e=>studioShortcutClick(e,'promo');
  const merchanBtn=$('merchanListBtn');
  if(merchanBtn) merchanBtn.onclick=e=>studioShortcutClick(e,'merchan');
  const historyBtn=$('historyListBtn');
  if(historyBtn) historyBtn.onclick=e=>studioShortcutClick(e,'history');
  document.querySelectorAll('.promoListItem[data-promo-id], .promoPill[data-promo-id], .hourReadList .promoListItem[data-promo-id]').forEach(btn=>btn.onclick=e=>studioPautaItemClick(e,btn.dataset.promoId));
}
$('cancelWinnerBtn').addEventListener('click',closeWinnerModal);
$('saveWinnerBtn').addEventListener('click',saveWinner);
$('addWinnerBtn').addEventListener('click',addWinnerInput);
$('winnerInputsList').addEventListener('input',event=>{ if(event.target.classList.contains('winnerNameField')) validateAllWinnerInputs(); });
$('winnerInputsList').addEventListener('click',event=>{
  const similarity=event.target.closest('[data-winner-similarity]');
  if(!similarity) return;
  const candidate=similarity.closest('.winnerCandidate');
  const input=candidate?.querySelector('.winnerNameField');
  resolveStudioWinnerSimilarity(input,similarity,validateAllWinnerInputs);
});
$('winnerModal').addEventListener('click',e=>{ if(e.target.id==='winnerModal') closeWinnerModal(); });
$('winnerModal').addEventListener('keydown',e=>{
  if(e.key==='Enter' && e.target.classList.contains('winnerNameField')){ e.preventDefault(); saveWinner(); }
  if(e.key==='Escape'){ closeWinnerModal(); }
});

document.addEventListener('click',e=>{
  const shortcut=e.target.closest('#promoListBtn,#merchanListBtn,#historyListBtn');
  if(shortcut){
    if(shortcut.id==='promoListBtn') return studioShortcutClick(e,'promo');
    if(shortcut.id==='merchanListBtn') return studioShortcutClick(e,'merchan');
    if(shortcut.id==='historyListBtn') return studioShortcutClick(e,'history');
  }
  const pauta=e.target.closest('.promoListItem[data-promo-id], .promoPill[data-promo-id], .hourReadList .promoListItem[data-promo-id]');
  if(pauta) return studioPautaItemClick(e,pauta.dataset.promoId);
});

document.addEventListener('click',e=>{ const h=e.target.closest('#historyListBtn, #historyBtn, [data-history]'); if(h){ e.preventDefault(); openHistoryModal(); }});
$('closeHistoryBtn').addEventListener('click',closeHistoryModal);
$('historyTodayBtn').addEventListener('click',()=>{ $('historyDateInput').value=todayISO(); renderHistoryList(); });
$('historyDateInput').addEventListener('change',renderHistoryList);
$('historyModal').addEventListener('click',e=>{ if(e.target.id==='historyModal') closeHistoryModal(); });
window.addEventListener('storage',()=>{state=loadState();selectStudioMonth();if(!manual)selectedIndex=-1;render();});
window.addEventListener('focus',()=>syncStateFromApi(true));
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) syncStateFromApi(true); });
setInterval(()=>{
  const hk=currentHourKey();
  if(hk!==lastHourKey){
    manual=false;
    selectedIndex=-1;
    selectedPromoId=null;
    manualHourDateMs=null;
    lastHourKey=hk;
  }
  if(!manual) selectedIndex=-1;
  renderStudioDateStamp();
  syncStateFromApi(false);
  if(!manual) render();
},3000);
selectStudioMonth();
if($('historyDateInput')) $('historyDateInput').value=todayISO();
render();
syncStateFromApi(true);
initWinnerBank(true);
setTimeout(()=>syncStateFromApi(true),1800);
setTimeout(()=>syncStateFromApi(true),6000);
</script>
</body>
</html>
