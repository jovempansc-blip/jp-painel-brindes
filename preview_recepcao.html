<!doctype html>
<html lang="pt-BR">
<head>

<style>
:root{--ink:#171c26;--muted:#697386;--line:#dfe5ec;--green:#137947;--red:#d7324e;--bg:#f4f6fa;--studioBg:url("assets/bg-estudio.jpg")}
*{box-sizing:border-box}
html,body{min-height:100%}
body{margin:0;background:linear-gradient(180deg,rgba(246,248,252,.90),rgba(245,247,251,.95)),var(--studioBg) center/cover fixed no-repeat;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--ink);text-transform:uppercase;font-weight:900}
.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px;background:rgba(255,255,255,.72);border:1px solid rgba(223,229,236,.9);border-radius:22px;padding:14px 16px;box-shadow:0 10px 26px rgba(16,24,40,.045);backdrop-filter:blur(8px)}
.logoBar{width:min(560px,100%);display:flex;align-items:center;justify-content:center;padding:10px 18px;margin:0 auto 18px;border:1px solid rgba(223,229,236,.92);border-radius:20px;background:rgba(255,255,255,.86);box-shadow:0 10px 24px rgba(16,24,40,.055);backdrop-filter:blur(8px)}
.logoBar img{display:block;width:min(100%,460px);max-height:58px;height:auto;object-fit:contain}
.wrap{width:min(1180px,100%);margin:0 auto;padding:28px}

.brand{display:flex;align-items:center;gap:14px}
.brand h1{margin:0;font-size:25px;letter-spacing:-.04em}
.brand span{display:block;margin-top:4px;color:#ff8200;font-size:12px;letter-spacing:.05em}
.controls{display:flex;align-items:center;gap:10px}
input{height:44px;border:1px solid #dfe5ec;border-radius:14px;background:#fff;padding:0 13px;font-size:14px;font-weight:1000;color:#171c26;text-transform:uppercase}
.updated{color:#687385;font-size:11px}
.hero{display:grid;gap:18px;margin-bottom:18px}
.titleBox,.descBox{border:1px solid #dfe5ec;border-radius:22px;background:#fff;min-height:76px;display:grid;place-items:center;padding:18px 28px;box-shadow:0 10px 24px rgba(16,24,40,.04)}
.titleBox{box-shadow:inset 5px 0 0 #d7324e,0 10px 24px rgba(16,24,40,.04)}
.titleBox h2{margin:0;font-size:28px;letter-spacing:-.04em;text-align:center}
.descBox p{margin:0;color:#5f6a7a;font-size:15px;text-align:center}
.list{display:grid;gap:12px}
.resultCard{display:grid;grid-template-columns:105px minmax(0,1fr) auto;gap:16px;align-items:center;border:1px solid #dfe5ec;border-radius:22px;background:rgba(255,255,255,.88);padding:18px 20px;box-shadow:0 8px 20px rgba(16,24,40,.05)}
.time{font-size:36px;letter-spacing:-.08em;color:#667186}
.info strong{display:block;font-size:20px;line-height:1.08}
.info span{display:block;margin-top:7px;color:#5e6877;font-size:13px;line-height:1.35}
.result{display:inline-flex;align-items:center;min-height:32px;border-radius:999px;border:1px solid #ccefdc;background:#effaf4;color:#137947;padding:0 12px;font-size:12px;font-weight:1000}
.empty{padding:42px;text-align:center;border:1px dashed #cdd5df;border-radius:22px;background:rgba(255,255,255,.72);color:#697386}
@media(max-width:760px){.wrap{padding:18px}.top{display:grid}.controls{justify-content:space-between}.resultCard{grid-template-columns:1fr}.time{font-size:30px}.titleBox h2{font-size:23px}}

.pickupWrap{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.pickupBtn{
  min-height:34px;
  border:1px solid #d8dee7;
  border-radius:999px;
  background:#171c26;
  color:#fff;
  padding:0 13px;
  font-size:11px;
  font-weight:1000;
  cursor:pointer;
  text-transform:uppercase;
}
.pickupBtn.done{
  background:#effaf4;
  color:#137947;
  border-color:#ccefdc;
}
.pickupHint{
  color:#7a8493;
  font-size:8px;
  font-weight:1000;
  letter-spacing:.04em;
  text-align:right;
}
.resultNames{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.resultNameTag{
  border:1px solid #dfe5ec;
  border-radius:999px;
  background:#fff;
  color:#171c26;
  padding:5px 8px;
  font-size:11px;
  font-weight:1000;
}


.expiredStamp{
  min-height:42px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid #ffd7a8;
  border-radius:14px;
  background:#fff7ec;
  color:#8a4b00;
  padding:7px 11px;
  font-size:10px;
  font-weight:1000;

  text-align:center;

}


/* AJUSTE FINAL — ESCALA COMPACTA E RESPONSIVA */
.wrap{padding:14px!important}.logoBar{max-width:500px!important;padding:8px 14px!important;margin-bottom:14px!important;border-radius:18px!important}.logoBar img{max-height:50px!important;max-width:420px!important}.head,.top{padding:12px 14px!important;margin-bottom:12px!important;border-radius:18px!important}.head h1,.brand h1,h1{font-size:21px!important}.controls{gap:8px!important;margin-bottom:12px!important}input,select,button,.control,.btn{min-height:34px!important;padding:7px 10px!important;border-radius:11px!important;font-size:11px!important}.panel{border-radius:20px!important;padding:13px!important;margin-bottom:12px!important}.panel h2{font-size:16px!important}.grid{gap:9px!important}.kpi{border-radius:15px!important;padding:11px!important}.kpi strong{font-size:24px!important}.item,.resultCard{gap:10px!important;padding:10px 12px!important;border-radius:15px!important}.time{font-size:22px!important}.info strong{font-size:12px!important}.info span{font-size:10px!important}.badge,.result{min-height:23px!important;font-size:9px!important;padding:0 8px!important}.titleBox,.descBox{border-radius:16px!important;padding:14px 18px!important}.titleBox h2{font-size:23px!important}.descBox p{font-size:13px!important}.body{padding:14px!important}.layout{gap:12px!important}.preview{padding:10px!important;border-radius:16px!important}.previewTitle{font-size:22px!important;padding:13px 15px!important}.previewDesc{font-size:14px!important;padding:13px 15px!important}.readHour span{min-height:25px!important;font-size:9px!important}.styleGrid{gap:6px!important;padding:7px!important}.table th,.table td{padding:8px!important;font-size:11px!important}@media(max-width:900px){.wrap{padding:10px!important}.layout,.grid{grid-template-columns:1fr!important}.logoBar img{max-width:320px!important}.head,.top{display:grid!important}}


/* === V23: RECEPÇÃO COM BOTÕES MAIS LEVES === */
.pickupBtn{

/* === V28: PRAZO DE RETIRADA — 5 DIAS ÚTEIS APÓS CONFIRMAÇÃO === */

}

.resultNames{

}

.expiredStamp{

  border-color:#f3b5c0!important;

/* === V29: RECEPÇÃO OPERACIONAL — FILTROS, STATUS E GANHADOR EM DESTAQUE === */

}

}

}

.receptionStats{

}
.statChip{
  min-height:28px;

.resultCard{

.time{
  color:#5f6b7d!important;
  font-size:24px!important;
  font-weight:1000!important;
  letter-spacing:-.07em!important;
}
.info strong{
  font-size:14px!important;
  letter-spacing:-.02em;
  margin-bottom:3px;
}
.info span{font-size:10px!important}
.winnerBlock{

}
.winnerLabel{

}
.resultNameTag{
  background:#fff!important;
  border-color:#d8e0ea!important;
  color:#171c26!important;
  font-size:12px!important;
  min-height:28px;
  padding:0 11px!important;
}
.deadlineNote{
  min-height:27px!important;
  font-size:9px!important;
  padding:0 10px!important;
}
.pickupWrap{align-items:flex-end!important;min-width:190px}
.pickupStatus{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:31px;
  border-radius:999px;
  padding:0 11px;
  font-size:9.5px;
  font-weight:1000;

}
.pickupStatus.done{background:#effaf4;border:1px solid #bde9ce;color:#137947}
.pickupBtn{

}
.undoPickupBtn{
  min-height:22px!important;
  border:1px solid #dfe5ec;
  border-radius:999px!important;
  background:#f8fafc;

  padding:0 8px!important;
  font-size:7.5px!important;
  font-weight:1000;
  letter-spacing:.05em;
  cursor:pointer;
}
.undoPickupBtn:hover{background:#fff;border-color:#cfd8e4;color:#171c26}
.pickupHint{display:none!important}

@media(max-width:900px){
  .receptionToolbar{grid-template-columns:1fr!important}
  .receptionStats{justify-content:flex-start}
  .resultCard{grid-template-columns:1fr!important}
  .pickupWrap{align-items:flex-start!important;min-width:0}
}

</style>

<body>
<div class="wrap">
  <div class="logoBar"><img src="assets/logo-workspace-jp.png" alt="Workspace Jovem Pan Floripa"></div>
  <header class="top">
    <div class="brand"><div><h1>RECEPÇÃO</h1><span>CONFERÊNCIA DE SORTEIOS</span></div></div>
    <div class="controls"><input id="dateFilter" type="date"><span class="updated" id="updated">CARREGANDO...</span></div>
  </header>
  <section class="hero receptionHero">
    <div class="titleBox"><h2>CONTROLE DE RETIRADA</h2></div>
    <div class="descBox"><p>CONFIRA GANHADOR, PRÊMIO, PRAZO E STATUS DE ENTREGA.</p></div>
  </section>
  <section class="receptionToolbar" aria-label="Filtros da recepção">
    <div class="filterField searchField"><label>BUSCA</label><input id="searchFilter" type="search" placeholder="BUSCAR GANHADOR, PRÊMIO OU PROGRAMA"></div>
    <div class="filterField"><label>STATUS</label><select id="statusFilter"><option value="TODOS">TODOS</option><option value="PENDENTE">PENDENTES</option><option value="VENCE_HOJE">VENCE HOJE</option><option value="VENCE_AMANHA">VENCE AMANHÃ</option><option value="RETIRADO">RETIRADOS</option><option value="VENCIDO">VENCIDOS</option></select></div>
    <div class="receptionStats" id="receptionStats"></div>
  </section>
  <main class="list" id="resultList"></main>
</div>
<script>

const FIREBASE_CONFIG = {
  "apiKey": "AIzaSyAgGd6f0xQS2F7L8rKhB4Qhcz1eAlKgaPE",
  "authDomain": "jp-painel-brindes.firebaseapp.com",
  "databaseURL": "https://jp-painel-brindes-default-rtdb.firebaseio.com",
  "projectId": "jp-painel-brindes",
  "storageBucket": "jp-painel-brindes.firebasestorage.app",
  "messagingSenderId": "843544648278",
  "appId": "1:843544648278:web:066c8e64e17da046cf79f7",
  "measurementId": "G-VB6Y2TS796"
};
const FIREBASE_ROOT_PATH='jp-painel-brindes/state';
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const upper=v=>String(v??'').trim().replace(/\s+/g,' ').toUpperCase();
const pad=n=>String(n).padStart(2,'0');
const todayISO=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
const monthKey=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;}
const formatBR=iso=>{if(!iso)return'';const [y,m,d]=String(iso).split('-');return y&&m&&d?`${d}/${m}/${y}`:iso;}
const slotHour=slot=>{const m=String(slot||'').match(/(\d{1,2})/);return m?Number(m[1]):0;}
const timeToHHMM=slot=>slotHour(slot)?`${pad(slotHour(slot))}:00`:String(slot||'23:59').slice(0,5);
const formatTime=slot=>slotHour(slot)?`${pad(slotHour(slot))}H`:upper(slot||'--H');
const statusBadge=s=>upper(s)==='REALIZADO'?'<span class="badge green">REALIZADO</span>':upper(s)==='NO AR'?'<span class="badge green">NO AR</span>':`<span class="badge">${esc(upper(s||'PENDENTE'))}</span>`;
let state={months:{}}, currentMonth='';
function monthData(){return state.months?.[currentMonth]||{items:[],promos:[],distributions:[]};}
function availableMonths(){return Object.keys(state.months||{}).sort();}
function selectMonthForDate(date){const m=String(date||todayISO()).slice(0,7); currentMonth=state.months?.[m]?m:(state.currentMonth||availableMonths().at(-1)||m);}
function distributionById(id){return (monthData().distributions||[]).find(d=>d.id===id)||{};}
function itemTitle(i){const d=distributionById(i.distributionId);return upper(i.title||d.title||i.prize||'SEM TÍTULO');}
function itemDesc(i){const d=distributionById(i.distributionId);return i.notes||d.description||'';}
function channelName(i){return upper(i.channel||'RÁDIO');}
function promoTitle(p){return upper(p.name||p.title||'PROMOÇÃO');}
firebase.initializeApp(FIREBASE_CONFIG);
const firebaseRef=firebase.database().ref(FIREBASE_ROOT_PATH);
function countStateRecords(data){
  if(!data || !data.months) return 0;
  return Object.values(data.months).reduce((total,m)=>total+(m.items||[]).length+(m.promos||[]).length+(m.distributions||[]).length,0) + (data.schedules||[]).length + (data.programSchedules||[]).length;
}
function saveReceptionState(){
  return firebaseRef.set({
    state,
    updatedAt:firebase.database.ServerValue.TIMESTAMP,
    savedAt:new Date().toISOString(),
    source:'PREVIEW_RECEPCAO',
    user:'RECEPCAO',
    version:'FIREBASE_RTDB_V1'
  });
}

function normalizeWinnerList(list){
  if(!Array.isArray(list)) return [];
  const seen=new Set();
  return list.map(w=>typeof w==='string'?{name:upper(w)}:{...w,name:upper(w?.name||'')})
    .filter(w=>w.name)
    .filter(w=>{ if(seen.has(w.name)) return false; seen.add(w.name); return true; });
}
function promoWinnerList(p){
  const base=normalizeWinnerList(p.resultWinners||[]);
  if(base.length) return base;
  if(p.resultName) return normalizeWinnerList(String(p.resultName).split(',').map(name=>({name})));
  return [];
}
function addBusinessDaysFrom(dateValue,days=5){
  const dt=new Date(dateValue);
  if(Number.isNaN(dt.getTime())) return null;
  let added=0;
  dt.setHours(23,59,59,999);
  while(added<days){
    dt.setDate(dt.getDate()+1);
    const dow=dt.getDay();
    if(dow!==0 && dow!==6) added++;
  }
  return dt;
}
function registeredDateForPromo(p,w){
  const value=w.registeredAt || p.resultAt || (p.resultDate?`${p.resultDate}T${(p.drawTime||'23:59').slice(0,5)}:00`:'') || (p.drawDate?`${p.drawDate}T${(p.drawTime||'23:59').slice(0,5)}:00`:'');
  const dt=new Date(value);
  return Number.isNaN(dt.getTime())?null:dt;
}
function startOfDay(d){
  const x=new Date(d);
  x.setHours(0,0,0,0);
  return x;
}
function deadlineInfo(dateValue,deliveredAt=''){
  const deadline=addBusinessDaysFrom(dateValue,5);
  if(!deadline || Number.isNaN(deadline.getTime())) return {deadline:null,label:'',className:'',expired:false};
  const today=startOfDay(new Date());
  const limit=startOfDay(deadline);
  const diffDays=Math.round((limit-today)/86400000);
  const formatted=formatBR(`${deadline.getFullYear()}-${pad(deadline.getMonth()+1)}-${pad(deadline.getDate())}`);
  if(deliveredAt) return {deadline,label:`RETIRADO · PRAZO ERA ${formatted}`,className:'ok',expired:false};
  if(diffDays<0) return {deadline,label:`PRAZO VENCIDO EM ${formatted}`,className:'expired',expired:true};
  if(diffDays===0) return {deadline,label:'VENCE HOJE',className:'today',expired:false};
  if(diffDays===1) return {deadline,label:'VENCE AMANHÃ',className:'tomorrow',expired:false};
  return {deadline,label:`PRAZO ATÉ ${formatted}`,className:'ok',expired:false};
}
function isExpiredNoPickup(dateValue){
  const info=deadlineInfo(dateValue,'');
  return !!info.expired;
}
function resultRowsForDate(date){
  selectMonthForDate(date);
  const items=(monthData().items||[])
    .filter(i=>i.date===date && (upper(i.status)==='REALIZADO' || upper(i.winnerName)))
    .map(i=>{
      const reg=i.resultAt || i.winnerAt || `${i.date||date}T${timeToHHMM(i.slot||'23:59')}:00`;
      const deadline=deadlineInfo(reg,i.deliveredAt||'');
      return {
        source:'item',
        id:i.id,
        winnerIndex:-1,
        time:formatTime(i.slot),
        sort:`${date}T${timeToHHMM(i.slot)}`,
        title:itemTitle(i),
        sub:`${upper(i.program||'')} · ${channelName(i)}`,
        result:upper(i.winnerName||'REALIZADO'),
        deliveredAt:i.deliveredAt||'',
        deliveredAtLabel:i.deliveredAtLabel||'',
        deadlineLabel:deadline.label,
        deadlineClass:deadline.className,
        expired:!i.deliveredAt && deadline.expired
      };
    });
  const promos=[];
  (monthData().promos||[])
    .filter(p=>promoWinnerList(p).length && (p.resultDate===date || p.drawDate===date))
    .forEach(p=>{
      promoWinnerList(p).forEach((w,idx)=>{
        const reg=registeredDateForPromo(p,w);
        const deadline=deadlineInfo(reg,w.deliveredAt||'');
        promos.push({
          source:'promo',
          id:p.id,
          winnerIndex:idx,
          time:p.resultSlot||((p.drawTime||'').slice(0,5)||'--:--'),
          sort:`${date}T${(p.drawTime||'23:59').slice(0,5)}`,
          title:promoTitle(p),
          sub:upper(p.local||p.type||'PROMOÇÃO'),
          result:upper(w.name),
          deliveredAt:w.deliveredAt||'',
          deliveredAtLabel:w.deliveredAtLabel||'',
          deadlineLabel:deadline.label,
          deadlineClass:deadline.className,
          expired:!w.deliveredAt && deadline.expired
        });
      });
    });
  return [...items,...promos].sort((a,b)=>a.sort.localeCompare(b.sort)||a.title.localeCompare(b.title)||a.result.localeCompare(b.result));
}
function pickupButton(row){
  if(row.expired) return `<div class="pickupWrap"><div class="expiredStamp">NÃO RETIRADO NO PRAZO<br>PRÊMIO VOLTOU À CIRCULAÇÃO</div></div>`;
  const done=!!row.deliveredAt;
  if(done){
    return `<div class="pickupWrap"><span class="pickupStatus done">RETIRADO ${esc(row.deliveredAtLabel||'')}</span><button class="undoPickupBtn" type="button" data-source="${esc(row.source)}" data-id="${esc(row.id)}" data-winner-index="${esc(row.winnerIndex)}">CANCELAR RETIRADA</button></div>`;
  }
  const statusClass=row.deadlineClass==='today'?' expiringToday':(row.deadlineClass==='tomorrow'?' expiringTomorrow':'');
  return `<div class="pickupWrap"><button class="pickupBtn${statusClass}" data-source="${esc(row.source)}" data-id="${esc(row.id)}" data-winner-index="${esc(row.winnerIndex)}">CONFIRMAR RETIRADA</button></div>`;
}
function setPickup(row,undo=false){
  selectMonthForDate($('dateFilter').value||todayISO());
  const now=new Date();
  if(row.source==='item'){
    const item=(monthData().items||[]).find(i=>i.id===row.id);
    if(!item) return;
    if(undo){
      item.deliveredAt='';
      item.deliveredAtLabel='';
      item.deliveredBy='';
    }else{
      item.deliveredAt=now.toISOString();
      item.deliveredAtLabel=now.toLocaleString('pt-BR');
      item.deliveredBy='RECEPCAO';
    }
  }else if(row.source==='promo'){
    const promo=(monthData().promos||[]).find(p=>p.id===row.id);
    if(!promo) return;
    let winners=promoWinnerList(promo);
    const idx=Number(row.winnerIndex);
    if(!winners[idx]) return;
    if(undo){
      winners[idx].deliveredAt='';
      winners[idx].deliveredAtLabel='';
      winners[idx].deliveredBy='';
    }else{
      winners[idx].deliveredAt=now.toISOString();
      winners[idx].deliveredAtLabel=now.toLocaleString('pt-BR');
      winners[idx].deliveredBy='RECEPCAO';
    }
    promo.resultWinners=winners;
    promo.resultName=winners.map(w=>w.name).join(', ');
  }
  saveReceptionState().then(()=>render()).catch(err=>{console.warn('PICKUP SAVE ERROR',err);alert('NÃO FOI POSSÍVEL SALVAR A RETIRADA. TENTE NOVAMENTE.');});
}
function rowStatus(row){
  if(row.deliveredAt) return 'RETIRADO';
  if(row.expired) return 'VENCIDO';
  if(row.deadlineClass==='today') return 'VENCE_HOJE';
  if(row.deadlineClass==='tomorrow') return 'VENCE_AMANHA';
  return 'PENDENTE';
}
function rowStatusClass(row){
  const st=rowStatus(row);
  return st==='RETIRADO'?'retirado':st==='VENCIDO'?'vencido':st==='VENCE_HOJE'?'vence-hoje':st==='VENCE_AMANHA'?'vence-amanha':'pendente';
}
function applyReceptionFilters(rows){
  const query=upper($('searchFilter')?.value||'');
  const status=upper($('statusFilter')?.value||'TODOS');
  return rows.filter(r=>{
    if(status && status!=='TODOS' && rowStatus(r)!==status) return false;
    if(query){
      const hay=upper(`${r.title||''} ${r.sub||''} ${r.result||''} ${r.time||''} ${r.deadlineLabel||''}`);
      if(!hay.includes(query)) return false;
    }
    return true;
  });
}
function renderReceptionStats(rows){
  const counts=rows.reduce((acc,r)=>{acc[rowStatus(r)]=(acc[rowStatus(r)]||0)+1;return acc;},{});
  const total=rows.length;
  const html=`<span class="statChip">TOTAL <strong>${total}</strong></span><span class="statChip">PENDENTES <strong>${counts.PENDENTE||0}</strong></span><span class="statChip">RETIRADOS <strong>${counts.RETIRADO||0}</strong></span><span class="statChip">VENCIDOS <strong>${counts.VENCIDO||0}</strong></span>`;
  const box=$('receptionStats');
  if(box) box.innerHTML=html;
}

function rowFromButton(btn){
  return {source:btn.dataset.source,id:btn.dataset.id,winnerIndex:btn.dataset.winnerIndex};
}
function render(){
  const date=$('dateFilter').value||todayISO();
  const rows=resultRowsForDate(date);
  const filtered=applyReceptionFilters(rows);
  renderReceptionStats(rows);
  $('resultList').innerHTML=filtered.length?filtered.map(r=>{
    const deadline = r.deadlineLabel ? `<span class="deadlineNote ${esc(r.deadlineClass||'')}">${esc(r.deadlineLabel)}</span>` : '';
    return `<article class="resultCard status-${esc(rowStatusClass(r))}"><div class="time">${esc(r.time)}</div><div class="info"><strong>${esc(r.title)}</strong><span>${esc(r.sub)}</span><div class="winnerBlock"><span class="winnerLabel">GANHADOR</span><span class="resultNameTag">${esc(r.result)}</span>${deadline}</div></div>${pickupButton(r)}</article>`;
  }).join(''):'<div class="empty">NENHUM RESULTADO ENCONTRADO PARA ESTE FILTRO.</div>';
}
document.addEventListener('click',e=>{
  const undo=e.target.closest('.undoPickupBtn');
  if(undo){
    const row=rowFromButton(undo);
    if(confirm('CANCELAR A CONFIRMAÇÃO DE RETIRADA?')) setPickup(row,true);
    return;
  }
  const btn=e.target.closest('.pickupBtn');
  if(!btn) return;
  const row=rowFromButton(btn);
  if(confirm('CONFIRMAR RETIRADA DESTE PRÊMIO?')) setPickup(row,false);
});
document.addEventListener('contextmenu',e=>{
  const btn=e.target.closest('.pickupBtn');
  if(!btn) return;
  e.preventDefault();
  if(!btn.classList.contains('done')) return;
  const row=rowFromButton(btn);
  if(confirm('CANCELAR A CONFIRMAÇÃO DE RETIRADA?')) setPickup(row,true);
});

$('dateFilter').value=todayISO();
$('dateFilter').addEventListener('change',render);
$('searchFilter').addEventListener('input',render);
$('statusFilter').addEventListener('change',render);
firebaseRef.on('value',snap=>{const payload=snap.val();if(payload&&payload.state){state=payload.state;selectMonthForDate($('dateFilter').value);render();$('updated').textContent='ATUALIZADO: '+new Date().toLocaleString('pt-BR');}});
</script>
</body>
</html>
